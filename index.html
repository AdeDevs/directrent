<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DirectRent – Find & Manage Rental Properties</title>

    <!-- SEO -->
    <meta
      name="description"
      content="DirectRent helps tenants find verified rental properties and connect directly with trusted agents."
    />
    <meta
      name="keywords"
      content="rent, apartments, nigeria, property, real estate, directrent"
    />
    <meta name="author" content="DirectRent" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Theme -->
    <meta name="theme-color" content="#0B1A2B" />

    <!-- Open Graph (Social Sharing) -->
    <meta
      property="og:title"
      content="DirectRent – Find & Manage Rental Properties"
    />
    <meta
      property="og:description"
      content="Browse verified listings, chat with agents, and rent with confidence."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourdomain.com" />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="DirectRent – Find & Manage Rental Properties"
    />
    <meta
      name="twitter:description"
      content="Browse verified listings and connect with agents directly."
    />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Fonts (optional, if you're using custom fonts) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Optional: preload critical assets -->
    <!-- <link rel="preload" href="/main.css" as="style" /> -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
